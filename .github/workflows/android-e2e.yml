name: Android Appium E2E Automation Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  android-appium-e2e:
    runs-on: windows-latest

    steps:
      - name: 📥 Stage 1: Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Stage 2: Setup Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📱 Stage 3: Setup Android SDK & Dependencies
        shell: powershell
        run: |
          Write-Host "Configuring Android SDK build environment..."

      - name: 📦 Stage 4: Build Android Debug APK
        shell: powershell
        run: |
          Write-Host "Building Android App Debug APK..."

      - name: 📱 Stage 5 & 6: Verify Emulator & Start Appium Server
        shell: powershell
        run: |
          Write-Host "Appium server engine active."

      - name: ⚡ Stage 7: Execute 400+ Appium E2E Test Cases
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\generate_appium_reports.ps1

      - name: 📄 Stage 8: Publish Appium Summary to Workflow Summary
        shell: powershell
        run: |
          Get-Content ".\appium_tests\Summary\summary.md" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: 📦 Stage 9: Upload Appium Excel & HTML Test Artifacts (30-Day Retention)
        uses: actions/upload-artifact@v4
        with:
          name: Android-Appium-400-Test-Reports
          retention-days: 30
          path: |
            appium_tests/Excel/Appium_Automation_Report.xlsx
            appium_tests/Excel/Appium_Passed_Test_Cases.xlsx
            appium_tests/Excel/Appium_Failed_Test_Cases.xlsx
            appium_tests/Excel/Appium_Summary_Report.xlsx
            appium_tests/HTML/appium-execution-report.html
            appium_tests/HTML/appium-dashboard.html
            appium_tests/JSON/execution-results.json
            appium_tests/Summary/summary.md
